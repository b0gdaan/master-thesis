server {
    listen 8080;
    server_name 72.56.38.144;

    root /var/www/thesis;
    index index.html;

    # Serve thesis figures
    location /thesis-assets/figures/ {
        alias /var/www/thesis/figures/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Main site
    location / {
        try_files $uri $uri/ =404;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 1024;

    access_log /var/log/nginx/thesis_access.log;
    error_log  /var/log/nginx/thesis_error.log;
}
